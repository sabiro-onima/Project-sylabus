services:

  # ─── DATABASE ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sylabus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sylabus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sylabus_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sylabus_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sylabus_user} -d ${POSTGRES_DB:-sylabus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sylabus_net

  # ─── REDIS ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sylabus_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sylabus_net

  # ─── MINIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sylabus_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - sylabus_net

  # ─── BACKEND ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sylabus_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sylabus_user}:${POSTGRES_PASSWORD:-sylabus_pass}@postgres:5432/${POSTGRES_DB:-sylabus_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - sylabus_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── CELERY WORKER ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sylabus_celery
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sylabus_user}:${POSTGRES_PASSWORD:-sylabus_pass}@postgres:5432/${POSTGRES_DB:-sylabus_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sylabus_net
    command: celery -A app.core.celery_app worker --loglevel=info

  # ─── FRONTEND ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sylabus_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sylabus_net

  # ─── PROMETHEUS ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: sylabus_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - sylabus_net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  # ─── GRAFANA ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: sylabus_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - sylabus_net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  sylabus_net:
    driver: bridge
